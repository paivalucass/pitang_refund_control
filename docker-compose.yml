services:
  db:
    image: postgres:16-alpine
    container_name: pitang_refund_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pitang_refund
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
